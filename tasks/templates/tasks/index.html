<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Django Todo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">My Tasks</h1>
        
        <form method="POST" class="flex gap-2 mb-6">
            {% csrf_token %}
            <input type="text" name="title" placeholder="What needs to be done?" required 
                   class="flex-1 border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Add</button>
        </form>

        <ul class="space-y-3">
            {% for task in tasks %}
            <li class="flex justify-between items-center bg-gray-50 p-3 rounded border">
                <span class="{% if task.completed %} line-through text-gray-400 {% endif %}">
                    {{ task.title }}
                </span>
<div class="flex gap-3">
            <a href="{% url 'edit_task' task.id %}" class="text-blue-500 hover:text-blue-700">Edit</a>
            <a href="{% url 'delete_task' task.id %}" class="text-red-500 hover:text-red-700">Delete</a>
        </div>            </li>
            {% empty %}
            <li class="text-center text-gray-500">No tasks yet. Add one above!</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
