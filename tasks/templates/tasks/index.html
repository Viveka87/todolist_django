<!DOCTYPE html>
<html>
<head>
    <title>Django Todo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">My Tasks</h1>
        
        <form method="POST" class="flex mb-4">
            {% csrf_token %}
            <input type="text" name="title" class="border p-2 flex-1 rounded-l" placeholder="New task...">
            <button type="submit" class="bg-blue-500 text-white px-4 rounded-r">Add</button>
        </form>

        <ul>
            {% for task in tasks %}
            <li class="border-b py-2 flex justify-between">
                {{ task.title }}
                <span class="text-xs text-gray-400">{{ task.created_at|timesince }} ago</span>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
