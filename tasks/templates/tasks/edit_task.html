<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h2 class="text-xl font-bold mb-4 text-blue-600">Edit Task</h2>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" value="{{ task.title }}" 
                   class="w-full border p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400">
            
            <div class="flex gap-2">
                <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Update Task</button>
                <a href="{% url 'index' %}" class="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400 text-center">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
