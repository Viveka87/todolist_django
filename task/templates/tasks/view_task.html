{% extends 'tasks/base.html' %} 
{% block content %}
<h1 class="mb-4">View Task</h1>

<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form method="POST" class="row g-3">
            {% csrf_token %}
            <div class="col-md-9">
                <label for="taskTitle" class="form-label fw-bold text-secondary">Task Title</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-list-check text-primary"></i>
                    </span>
                    <input type="text" name="title" id="taskTitle" class="form-control" placeholder="What needs to be done?" required>
                </div>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fa-solid fa-plus me-1"></i> Add Task
                </button>
            </div>
        </form>
    </div>
</div>

<table class="table table-striped table-hover mt-4 align-middle">
    <thead class="table-dark">
        <tr>
            <th>S.No</th>
            <th>Tasks</th>
            <th>Status</th>
            <th class="text-end">Action</th>   
        </tr> 
    </thead>
    <tbody>
        {% for task in task_list %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ task.title }}</td>
            <td>
                <span class="badge rounded-pill 
                    {% if task.status == 'completed' %} bg-success 
                    {% elif task.status == 'progress' %} bg-primary 
                    {% else %} bg-secondary {% endif %}">
                    {{ task.get_completed_display }}
                </span>
            </td>
            <td class="text-end">
                <a href="{% url 'edit_task' task.id %}" class="btn btn-primary btn-sm"> 
                    <i class="fa-solid fa-pen"></i> 
                </a> 
                <a href="{% url 'delete_task' task.id %}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure want to delete?')"> 
                    <i class="fa-solid fa-trash"></i>
                </a>
            </td>
        </tr>
        {% endfor %}  
    </tbody>
</table> 
{% endblock %}
